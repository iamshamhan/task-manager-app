<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Task Manager App - Login or Register" />
    <meta name="author" content="Task Manager" />
    <title>Task Manager | Login</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="logo-div">
        <span class="logo-icon">✓</span>
        <h1 class="app-name">TaskManager</h1>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-box">
        <div class="tab-btns">
          <button class="tab-btn active" id="loginTab" aria-selected="true">
            Login
          </button>
          <button class="tab-btn" id="registerTab" aria-selected="false">
            Register
          </button>
        </div>

        <!-- login form -->
        <section class="form-box" id="loginForm" aria-label="Login form">
          <h2 class="form-title">Welcome back</h2>
          <p class="form-sub">Login to access your tasks</p>

          <form id="login-form" novalidate>
            <div class="input-group">
              <label for="loginEmail" class="input-label">Email</label>
              <input
                type="email"
                id="loginEmail"
                name="email"
                class="input-field"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <span
                class="err-msg"
                id="loginEmailErr"
                aria-live="polite"
              ></span>
            </div>

            <div class="input-group">
              <label for="loginPassword" class="input-label">Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="loginPassword"
                  name="password"
                  class="input-field"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="show-pass"
                  id="toggleLoginPass"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span class="err-msg" id="loginPassErr" aria-live="polite"></span>
            </div>

            <button type="submit" class="submit-btn" id="loginBtn">
              Login
            </button>
          </form>

          <p class="switch-txt">
            Don't have an account?
            <button class="switch-btn" id="goToRegister">Register here</button>
          </p>
        </section>

        <!-- register form -->
        <section
          class="form-box hidden"
          id="registerForm"
          aria-label="Register form"
        >
          <h2 class="form-title">Create account</h2>
          <p class="form-sub">Start managing your tasks today</p>

          <form id="register-form" novalidate>
            <div class="input-group">
              <label for="regUsername" class="input-label">Username</label>
              <input
                type="text"
                id="regUsername"
                name="username"
                class="input-field"
                placeholder="Your name"
                autocomplete="username"
                required
              />
              <span
                class="err-msg"
                id="regUsernameErr"
                aria-live="polite"
              ></span>
            </div>

            <div class="input-group">
              <label for="regEmail" class="input-label">Email</label>
              <input
                type="email"
                id="regEmail"
                name="email"
                class="input-field"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <span class="err-msg" id="regEmailErr" aria-live="polite"></span>
            </div>

            <div class="input-group">
              <label for="regPassword" class="input-label">Password</label>
              <div class="input-wrap">
                <input
                  type="password"
                  id="regPassword"
                  name="password"
                  class="input-field"
                  placeholder="Create a password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="show-pass"
                  id="toggleRegPass"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span class="err-msg" id="regPassErr" aria-live="polite"></span>

              <div class="pass-strength" id="passStrength">
                <div class="strength-bars">
                  <span class="bar" id="bar1"></span>
                  <span class="bar" id="bar2"></span>
                  <span class="bar" id="bar3"></span>
                  <span class="bar" id="bar4"></span>
                </div>
                <span class="strength-txt" id="strengthTxt">Too short</span>
              </div>
            </div>

            <div class="input-group">
              <label for="regConfirmPass" class="input-label"
                >Confirm Password</label
              >
              <div class="input-wrap">
                <input
                  type="password"
                  id="regConfirmPass"
                  name="confirmPassword"
                  class="input-field"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="show-pass"
                  id="toggleConfirmPass"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span
                class="err-msg"
                id="regConfirmErr"
                aria-live="polite"
              ></span>
            </div>

            <button type="submit" class="submit-btn" id="registerBtn">
              Create Account
            </button>
          </form>

          <p class="switch-txt">
            Already have an account?
            <button class="switch-btn" id="goToLogin">Login here</button>
          </p>
        </section>
      </div>
    </main>

    <footer class="bottom-footer">
      <p>© 2026 TaskManager. All rights reserved.</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
