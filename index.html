<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Task Manager App - Organize your tasks efficiently"
    />
    <meta name="author" content="Task Manager" />
    <title>Task Manager | Login</title>
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="auth-header">
      <div class="auth-header__logo">
        <span class="auth-header__icon">✓</span>
        <h1 class="auth-header__title">TaskManager</h1>
      </div>
    </header>

    <!-- Main Auth Container -->
    <main class="auth-main">
      <div class="auth-card">
        <!-- Tabs -->
        <div class="auth-tabs">
          <button
            class="auth-tab auth-tab--active"
            id="tab-login"
            aria-selected="true"
          >
            Login
          </button>
          <button class="auth-tab" id="tab-register" aria-selected="false">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <section class="auth-form" id="form-login" aria-label="Login form">
          <h2 class="auth-form__title">Welcome back</h2>
          <p class="auth-form__subtitle">Login to access your tasks</p>

          <form id="login-form" novalidate>
            <div class="form-group">
              <label for="login-email" class="form-label">Email</label>
              <input
                type="email"
                id="login-email"
                name="email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <span
                class="form-error"
                id="login-email-error"
                aria-live="polite"
              ></span>
            </div>

            <div class="form-group">
              <label for="login-password" class="form-label">Password</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="login-password"
                  name="password"
                  class="form-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="input-toggle"
                  id="toggle-login-password"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span
                class="form-error"
                id="login-password-error"
                aria-live="polite"
              ></span>
            </div>

            <button
              type="submit"
              class="btn btn--primary btn--full"
              id="login-submit"
            >
              Login
            </button>
          </form>

          <p class="auth-switch">
            Don't have an account?
            <button class="auth-switch__btn" id="go-to-register">
              Register here
            </button>
          </p>
        </section>

        <!-- Register Form -->
        <section
          class="auth-form auth-form--hidden"
          id="form-register"
          aria-label="Register form"
        >
          <h2 class="auth-form__title">Create account</h2>
          <p class="auth-form__subtitle">Start managing your tasks today</p>

          <form id="register-form" novalidate>
            <div class="form-group">
              <label for="register-username" class="form-label">Username</label>
              <input
                type="text"
                id="register-username"
                name="username"
                class="form-input"
                placeholder="Your name"
                autocomplete="username"
                required
              />
              <span
                class="form-error"
                id="register-username-error"
                aria-live="polite"
              ></span>
            </div>

            <div class="form-group">
              <label for="register-email" class="form-label">Email</label>
              <input
                type="email"
                id="register-email"
                name="email"
                class="form-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <span
                class="form-error"
                id="register-email-error"
                aria-live="polite"
              ></span>
            </div>

            <div class="form-group">
              <label for="register-password" class="form-label">Password</label>
              <div class="input-wrapper">
                <input
                  type="password"
                  id="register-password"
                  name="password"
                  class="form-input"
                  placeholder="Create a password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="input-toggle"
                  id="toggle-register-password"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span
                class="form-error"
                id="register-password-error"
                aria-live="polite"
              ></span>

              <!-- Password Strength Indicator -->
              <div class="password-strength" id="password-strength">
                <div class="password-strength__bars">
                  <span class="strength-bar" id="bar-1"></span>
                  <span class="strength-bar" id="bar-2"></span>
                  <span class="strength-bar" id="bar-3"></span>
                  <span class="strength-bar" id="bar-4"></span>
                </div>
                <span class="password-strength__label" id="strength-label"
                  >Too short</span
                >
              </div>
            </div>

            <div class="form-group">
              <label for="register-confirm-password" class="form-label"
                >Confirm Password</label
              >
              <div class="input-wrapper">
                <input
                  type="password"
                  id="register-confirm-password"
                  name="confirmPassword"
                  class="form-input"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="input-toggle"
                  id="toggle-confirm-password"
                  aria-label="Show password"
                >
                  👁
                </button>
              </div>
              <span
                class="form-error"
                id="register-confirm-error"
                aria-live="polite"
              ></span>
            </div>

            <button
              type="submit"
              class="btn btn--primary btn--full"
              id="register-submit"
            >
              Create Account
            </button>
          </form>

          <p class="auth-switch">
            Already have an account?
            <button class="auth-switch__btn" id="go-to-login">
              Login here
            </button>
          </p>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer class="auth-footer">
      <p>© 2026 TaskManager. All rights reserved.</p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
